spring.application.name=soccer-platform
spring.config.import=optional:classpath:application-secrets.properties

# MySQL JDBC 드라이버 클래스를 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MySQL DB 접속 주소를 설정
spring.datasource.url=jdbc:mysql://localhost:3306/soccer_platform?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&tinyInt1isBit=false

# MySQL 접속 계정을 설정
spring.datasource.username=root
spring.datasource.password=${db.password}


# JPA가 사용할 DB 종류를 설정
# mysql: MySQL을 사용한다는 의미
# Spring Boot가 datasource 정보를 보고 자동 판단할 수 있어서 보통 생략 가능
# spring.jpa.database=mysql

# Hibernate가 사용할 MySQL 방언을 직접 설정
# MySQL8Dialect: MySQL 8 기준 SQL 문법 사용
# Spring Boot 3.x / Hibernate 6에서는 DB 정보를 보고 자동 판단 가능해서 보통 생략 가능
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# JPA Entity와 DB 테이블을 어떻게 맞출지 설정
# none: 아무것도 하지 않음
# validate: Entity와 테이블이 맞는지만 검사하고, 다르면 에러 발생
# update: 기존 테이블은 유지하고, 없는 테이블이나 컬럼은 추가
# create: 서버 실행 때 기존 테이블을 삭제하고 다시 생성
# create-drop: 서버 실행 때 생성하고, 서버 종료 때 삭제
spring.jpa.hibernate.ddl-auto=update

# JPA가 Entity를 보고 테이블 생성 SQL을 실행할지 설정
# false: JPA가 직접 DDL 생성 실행을 하지 않음
# true: JPA가 Entity 기준으로 테이블 생성 SQL 실행을 허용
# ddl-auto 설정과 역할이 겹쳐서 현재는 주석 처리
# spring.jpa.generate-ddl=false

# JPA가 실행하는 SQL을 콘솔에 출력할지 설정
# true: SELECT, INSERT, UPDATE, DELETE SQL을 콘솔에 출력
# false: SQL을 콘솔에 출력하지 않음
spring.jpa.show-sql=true

# Hibernate SQL을 보기 좋게 줄바꿈해서 출력할지 설정
# true: SQL을 여러 줄로 보기 좋게 출력
# false: SQL을 한 줄에 가깝게 출력
spring.jpa.properties.hibernate.format_sql=true

# SQL의 ? 자리에 실제로 들어간 값을 로그로 출력
# TRACE: 가장 자세한 로그 출력
# DEBUG: 디버깅용 로그 출력
# INFO: 일반 정보 로그 출력
# WARN: 경고 로그 출력
# ERROR: 에러 로그 출력
# Spring Boot 3.x / Hibernate 6 기준으로 이 설정을 사용하는 것이 맞음
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# SQL의 ? 값 바인딩 로그를 출력하던 예전 설정
# Spring Boot 2.x / Hibernate 5에서 많이 사용
# Spring Boot 3.x / Hibernate 6에서는 안 먹을 수 있어서 주석 처리
# logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


# 코드나 설정 파일이 변경되면 애플리케이션을 자동 재시작할지 설정
# true: 변경 감지 시 자동 재시작
# false: 자동 재시작하지 않음
spring.devtools.restart.enabled=true

# 브라우저 LiveReload 기능을 사용할지 설정
# true: 정적 파일 변경 시 브라우저 새로고침 지원
# false: LiveReload 사용하지 않음
# API 테스트만 할 때는 없어도 큰 문제 없음
spring.devtools.livereload.enabled=true


# 서버 요청과 응답에서 사용할 기본 문자 인코딩을 설정
# UTF-8: 한글 깨짐 방지를 위해 가장 많이 사용
server.servlet.encoding.charset=UTF-8

# 서블릿 인코딩 설정을 사용할지 설정
# true: 인코딩 설정 적용
# false: 인코딩 설정 적용하지 않음
server.servlet.encoding.enabled=true

# 요청과 응답에 지정한 인코딩을 강제로 적용할지 설정
# true: 요청과 응답 모두 UTF-8 강제 적용
# false: 상황에 따라 기본 인코딩 사용
server.servlet.encoding.force=true

# 요청에 지정한 인코딩을 강제로 적용할지 설정
# true: request body, 파라미터에 UTF-8 강제 적용
# false: 요청의 기존 인코딩을 따를 수 있음
server.servlet.encoding.force-request=true

# 응답에 지정한 인코딩을 강제로 적용할지 설정
# true: response body에 UTF-8 강제 적용
# false: 응답의 기존 인코딩을 따를 수 있음
server.servlet.encoding.force-response=true

# 경기 영상 파일 업로드 설정
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# ffprobe 실행 경로
app.video.ffprobe-path=ffprobe

# 로컬 경기 영상 저장 경로
app.upload.match-video-dir=uploads/match-videos

# ffmpeg 실행 경로
app.video.ffmpeg-path=ffmpeg

# 팀 분석 클립 파일 저장 경로
app.upload.team-analysis-clip-dir=uploads/team-analysis-clips

# 브라우저 접근용 팀 분석 클립 URL 경로
app.upload.team-analysis-clip-url-prefix=/uploads/team-analysis-clips

# 선수 개인 분석 클립 파일 저장 경로
app.upload.player-analysis-clip-dir=uploads/player-analysis-clips

# 브라우저 접근용 선수 개인 분석 클립 URL 경로
app.upload.player-analysis-clip-url-prefix=/uploads/player-analysis-clips

# 브라우저 접근용 업로드 URL 경로
app.upload.match-video-url-prefix=/uploads/match-videos

jwt.secret=${jwt.key}
jwt.access-token-expiration-ms=7200000

